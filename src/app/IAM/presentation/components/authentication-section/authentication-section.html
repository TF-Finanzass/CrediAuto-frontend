@if (store.isSignedIn()) {
  <button mat-button>{{ 'auth.welcome' | translate }}, {{ store.currentFullName() }}</button> | <button mat-button (click)="performSignOut()">{{ 'auth.sign-out' | translate }}</button>
} @else {
  <button mat-button (click)="performSignIn()">{{ 'auth.sign-in' | translate }}</button> | <button mat-button (click)="performSignUp()">{{ 'auth.sign-up' | translate }}</button>
}
