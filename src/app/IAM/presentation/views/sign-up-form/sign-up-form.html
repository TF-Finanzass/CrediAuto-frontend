<div class="auth-page">
  <div class="auth-card">
    <div class="auth-brand">
      <mat-icon class="brand-icon">directions_car</mat-icon>
      <div class="auth-brand-text">
        <h1>CrediAuto</h1>
        <span>Sistema financiero vehicular</span>
      </div>
    </div>

    <h2 class="auth-title">Crear cuenta</h2>

    <form [formGroup]="form" (submit)="performSignUp()" class="auth-form">
      <div class="campo">
        <label for="username">Usuario</label>
        <input id="username" name="username" required formControlName="username" class="auth-input">
        @if (isInvalidControl(form,'username')) {
          <span class="auth-error">{{ errorMessagesForControl(form,'username') }}</span>
        }
      </div>

      <div class="campo">
        <label for="password">Contraseña</label>
        <input type="password" id="password" name="password" formControlName="password" class="auth-input">
        @if (isInvalidControl(form,'password')) {
          <span class="auth-error">{{ errorMessagesForControl(form,'password') }}</span>
        }
      </div>

      <button type="submit" class="auth-submit">Crear cuenta</button>
    </form>

    <p class="auth-secondary">
      ¿Ya tienes cuenta? <a routerLink="/sign-in">Inicia sesión</a>
    </p>
  </div>
</div>
