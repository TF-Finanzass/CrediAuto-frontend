<aside class="nav-sidebar">

  <div class="brand">
    <mat-icon class="brand-icon">directions_car</mat-icon>
    <div class="brand-text">
      <h1>{{ 'app.brand-name' | translate }}</h1>
      <span>{{ 'app.brand-tagline' | translate }}</span>
    </div>
  </div>

  <nav class="nav-menu">
    @for (option of options(); track option.link) {
      <a mat-button class="nav-item" [routerLink]="option.link" routerLinkActive="active">
        <mat-icon>{{ option.icon }}</mat-icon>
        <span>{{ option.labelKey | translate }}</span>
      </a>
    }
  </nav>

  <div class="nav-footer">
    <app-authentication-section/>
  </div>

</aside>
